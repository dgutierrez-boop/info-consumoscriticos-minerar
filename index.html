<script>
// ============================================================
// ===== ASEGURAR QUE CHARTDATALABELS EXISTA =====
// ============================================================
if (typeof ChartDataLabels === 'undefined') {
    var ChartDataLabels = window['chartjs-plugin-datalabels'] || {};
}

const firebaseConfig = {
    apiKey: "AIzaSyD_nGBEHnS3VQ12QmSBCD7UCSM7EfLGyw",
    authDomain: "minerar-repuestos.firebaseapp.com",
    projectId: "minerar-repuestos",
    storageBucket: "minerar-repuestos.firebasestorage.app",
    messagingSenderId: "470761239890",
    appId: "1:470761239890:web:17bae94b1ade6ef42a368b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const CONFIG = {
    equipos: ["M442", "M443", "M444", "M445", "M446", "M447", "M448", "M450", "M451", "M452", "M453", "M454", "M455", "M456"],
    meses: ["Ene", "Feb", "Mar", "Abr", "May", "Jun", "Jul", "Ago", "Sep", "Oct", "Nov", "Dic"],
    passwordAdmin: "abrir",
    storageKey: "minerar_repuestos_v22"
};

let añoActual = 2026;
let datosPorAnio = {};
let charts = {};
let modoEdicionActivo = false;
let categoriasSeleccionadas = new Set();
let mesFiltrado = null;

// ============================================================
// ===== TODAS LAS CATEGORÍAS =====
// ============================================================
const CATEGORIAS = [
    'elasticosO', 'elasticosF', 'mazasN', 'mazasR',
    'bulonTuerca', 'neumaticoNuevo', 'neumaticoUsado',
    'patinFrenoNuevo', 'patinFrenoReparado', 'levaFreno',
    'pulmonFrenoNuevo', 'pulmonFrenoReparado', 'llantas',
    'amortiguador', 'bogie'
];

const CATEGORIAS_NOMBRES = {
    'elasticosO': 'Elasticos ORIG', 'elasticosF': 'Elasticos FAB',
    'mazasN': 'Mazas N', 'mazasR': 'Mazas R',
    'bulonTuerca': 'Bulon/Tuerca',
    'neumaticoNuevo': 'Neumatico N', 'neumaticoUsado': 'Neumatico U',
    'patinFrenoNuevo': 'Patín N', 'patinFrenoReparado': 'Patín R',
    'levaFreno': 'Leva',
    'pulmonFrenoNuevo': 'Pulmon N', 'pulmonFrenoReparado': 'Pulmon R',
    'llantas': 'Llantas',
    'amortiguador': 'Amortiguador',
    'bogie': 'Bogie'
};

function cardLabel(c) {
    return CATEGORIAS_NOMBRES[c] || c;
}

function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
    const btn = document.querySelector('.btn-dark-mode');
    btn.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    actualizarGraficos();
}

// ============================================================
// ===== INICIALIZACIÓN =====
// ============================================================
function crearDatosEjemplo() {
    const datos = {};
    CATEGORIAS.forEach(cat => {
        datos[cat] = {};
        CONFIG.equipos.forEach(eq => {
            datos[cat][eq] = [];
            for (let i = 0; i < 12; i++) {
                datos[cat][eq].push(Math.floor(Math.random() * 6) + 1);
            }
        });
    });
    return datos;
}

function asegurarTodasLasCategorias(datos) {
    CATEGORIAS.forEach(cat => {
        if (!datos[cat]) {
            datos[cat] = {};
            CONFIG.equipos.forEach(eq => {
                datos[cat][eq] = Array(12).fill(0);
                for (let i = 0; i < 12; i++) {
                    datos[cat][eq][i] = Math.floor(Math.random() * 5) + 1;
                }
            });
        } else {
            CONFIG.equipos.forEach(eq => {
                if (!datos[cat][eq]) {
                    datos[cat][eq] = Array(12).fill(0);
                    for (let i = 0; i < 12; i++) {
                        datos[cat][eq][i] = Math.floor(Math.random() * 5) + 1;
                    }
                } else if (datos[cat][eq].length < 12) {
                    while (datos[cat][eq].length < 12) {
                        datos[cat][eq].push(Math.floor(Math.random() * 5) + 1);
                    }
                }
            });
        }
    });
    return datos;
}

async function init() {
    try {
        const doc = await db.collection("repuestos_minerar").doc(`datos_${añoActual}`).get();
        if (doc.exists) {
            const data = doc.data();
            if (data.datosPorAnio && data.datosPorAnio[añoActual]) {
                datosPorAnio[añoActual] = data.datosPorAnio[añoActual];
            }
            if (data.precios) {
                Object.keys(data.precios).forEach(key => {
                    let elId = key === 'llanta' ? 'precioLlanta' : 
                               key === 'amortiguador' ? 'precioAmortiguador' :
                               key === 'bogie' ? 'precioBogie' :
                               'precio' + key.charAt(0).toUpperCase() + key.slice(1);
                    let el = document.getElementById(elId);
                    if (el) el.value = data.precios[key];
                });
            }
            if (data.horas) {
                Object.keys(data.horas).forEach(key => {
                    let el = document.getElementById(key);
                    if (el) el.value = data.horas[key];
                });
            }
        }
    } catch(e) {
        console.log("Cargando datos locales...");
    }

    if (!datosPorAnio[añoActual]) {
        datosPorAnio[añoActual] = crearDatosEjemplo();
    }

    datosPorAnio[añoActual] = asegurarTodasLasCategorias(datosPorAnio[añoActual]);

    actualizarTodo();
}

function obtenerDatosActual() {
    if (!datosPorAnio[añoActual]) {
        datosPorAnio[añoActual] = crearDatosEjemplo();
    }
    return datosPorAnio[añoActual];
}

function obtenerCantidadPorMes(categoria) {
    const d = obtenerDatosActual();
    const data = d[categoria];
    if (!data) return 0;

    let total = 0;
    CONFIG.equipos.forEach(eq => {
        if (data[eq]) {
            if (mesFiltrado !== null) {
                total += data[eq][mesFiltrado] || 0;
            } else {
                total += data[eq].reduce((a, b) => a + b, 0);
            }
        }
    });
    return total;
}

function obtenerCantidadPorTarjetas(categoria) {
    if (categoriasSeleccionadas.size > 0 && !categoriasSeleccionadas.has(categoria)) {
        return 0;
    }
    return obtenerCantidadPorMes(categoria);
}

// ============================================================
// ===== ACTUALIZAR TODO =====
// ============================================================
function actualizarTodo() {
    const d = obtenerDatosActual();

    // Generar encabezados de tablas
    const theadIds = [
        "theadElasticosO", "theadElasticosF", "theadMazasN", "theadMazasR",
        "theadBulonTuerca", "theadNeumaticoNuevo", "theadNeumaticoUsado",
        "theadPatinFrenoNuevo", "theadPatinFrenoReparado", "theadLevaFreno",
        "theadPulmonFrenoNuevo", "theadPulmonFrenoReparado", "theadLlantas",
        "theadAmortiguador", "theadBogie"
    ];

    theadIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) {
            let html = "<tr><th>Equipo</th>";
            CONFIG.meses.forEach(m => html += "<th>" + m + "</th>");
            html += "<th>TOTAL</th></tr>";
            el.innerHTML = html;
        }
    });

    // Generar tablas
    CATEGORIAS.forEach(cat => {
        const tbodyId = "tbody" + cat.charAt(0).toUpperCase() + cat.slice(1);
        const tbody = document.getElementById(tbodyId);
        if (!tbody) return;
        tbody.innerHTML = "";

        const datos = d[cat] || {};
        CONFIG.equipos.forEach(eq => {
            const data = datos[eq] || Array(12).fill(0);
            let fila = "<tr><td class='equipo-col'>" + eq + "</td>";
            let suma = 0;
            for (let i = 0; i < 12; i++) {
                const val = data[i] || 0;
                suma += val;
                fila += "<td class='editable-cell'><input type='number' min='0' value='" + val + "' data-eq='" + eq + "' data-mes='" + i + "' data-tipo='" + cat + "' readonly style='width:60px;'></td>";
            }
            fila += "<td class='total-row'><strong>" + suma + "</strong></td></tr>";
            tbody.insertAdjacentHTML("beforeend", fila);
        });

        let totales = Array(12).fill(0);
        CONFIG.equipos.forEach(eq => {
            const data = datos[eq] || Array(12).fill(0);
            for (let i = 0; i < 12; i++) totales[i] += data[i] || 0;
        });
        let totalGral = totales.reduce((a, b) => a + b, 0);
        let row = "<tr class='total-row'><td><strong>TOTAL</strong></td>";
        totales.forEach(t => row += "<td><strong>" + t + "</strong></td>");
        row += "<td><strong>" + totalGral + "</strong></td></tr>";
        tbody.insertAdjacentHTML("beforeend", row);
    });

    actualizarTarjetas();
    actualizarGraficos();
    calcularEconomico();
}

function actualizarTarjetas() {
    const ids = {
        'elasticosO': 'totalElasticosO',
        'elasticosF': 'totalElasticosF',
        'mazasN': 'totalMazasN',
        'mazasR': 'totalMazasR',
        'bulonTuerca': 'totalBulonTuerca',
        'neumaticoNuevo': 'totalNeumaticoNuevo',
        'neumaticoUsado': 'totalNeumaticoUsado',
        'patinFrenoNuevo': 'totalPatinFrenoNuevo',
        'patinFrenoReparado': 'totalPatinFrenoReparado',
        'levaFreno': 'totalLevaFreno',
        'pulmonFrenoNuevo': 'totalPulmonFrenoNuevo',
        'pulmonFrenoReparado': 'totalPulmonFrenoReparado',
        'llantas': 'totalLlantas',
        'amortiguador': 'totalAmortiguador',
        'bogie': 'totalBogie'
    };

    CATEGORIAS.forEach(cat => {
        const elId = ids[cat];
        if (elId) {
            document.getElementById(elId).textContent = obtenerCantidadPorMes(cat);
        }
    });
}

// ============================================================
// ===== VALORES ECONÓMICOS =====
// ============================================================
function calcularEconomico() {
    const cant = {};
    CATEGORIAS.forEach(cat => {
        cant[cat] = obtenerCantidadPorTarjetas(cat);
    });

    // Actualizar cantidades en la tabla
    const cantIds = {
        'elasticosO': 'cantElasticosO',
        'elasticosF': 'cantElasticosF',
        'mazasN': 'cantMazasN',
        'mazasR': 'cantMazasR',
        'bulonTuerca': 'cantBulon',
        'neumaticoNuevo': 'cantNeumaticoNuevo',
        'patinFrenoNuevo': 'cantPatinFrenoNuevo',
        'patinFrenoReparado': 'cantPatinFrenoReparado',
        'levaFreno': 'cantLevaFreno',
        'pulmonFrenoNuevo': 'cantPulmonFrenoNuevo',
        'pulmonFrenoReparado': 'cantPulmonFrenoReparado',
        'llantas': 'cantLlantas',
        'amortiguador': 'cantAmortiguador',
        'bogie': 'cantBogie'
    };

    CATEGORIAS.forEach(cat => {
        const elId = cantIds[cat];
        if (elId) {
            document.getElementById(elId).textContent = cant[cat] || 0;
        }
    });

    // Precios
    const prec = {
        elastO: parseFloat(document.getElementById("precioElasticoO").value) || 0,
        elastF: parseFloat(document.getElementById("precioElasticoF").value) || 0,
        mazaN: parseFloat(document.getElementById("precioMazaN").value) || 0,
        mazaR: parseFloat(document.getElementById("precioMazaR").value) || 0,
        bulon: parseFloat(document.getElementById("precioBulon").value) || 0,
        tuerca: parseFloat(document.getElementById("precioTuerca").value) || 0,
        neumaticoNuevo: parseFloat(document.getElementById("precioNeumaticoNuevo").value) || 0,
        patinFrenoNuevo: parseFloat(document.getElementById("precioPatinFrenoNuevo").value) || 0,
        patinFrenoReparado: parseFloat(document.getElementById("precioPatinFrenoReparado").value) || 0,
        levaFreno: parseFloat(document.getElementById("precioLevaFreno").value) || 0,
        pulmonFrenoNuevo: parseFloat(document.getElementById("precioPulmonFrenoNuevo").value) || 0,
        pulmonFrenoReparado: parseFloat(document.getElementById("precioPulmonFrenoReparado").value) || 0,
        llanta: parseFloat(document.getElementById("precioLlanta").value) || 0,
        amortiguador: parseFloat(document.getElementById("precioAmortiguador").value) || 0,
        bogie: parseFloat(document.getElementById("precioBogie").value) || 0
    };

    const setVal = function(id, v) {
        const el = document.getElementById(id);
        if (el) el.value = v ? formatMoney(v) : "";
    };

    setVal("totalElasticoO", cant.elasticosO * prec.elastO);
    setVal("totalElasticoF", cant.elasticosF * prec.elastF);
    setVal("totalMazaN", cant.mazasN * prec.mazaN);
    setVal("totalMazaR", cant.mazasR * prec.mazaR);
    setVal("totalBulon", cant.bulonTuerca * prec.bulon);
    setVal("totalTuerca", cant.bulonTuerca * prec.tuerca);
    setVal("totalNeumaticoNuevo", cant.neumaticoNuevo * prec.neumaticoNuevo);
    setVal("totalPatinFrenoNuevo", cant.patinFrenoNuevo * prec.patinFrenoNuevo);
    setVal("totalPatinFrenoReparado", cant.patinFrenoReparado * prec.patinFrenoReparado);
    setVal("totalLevaFreno", cant.levaFreno * prec.levaFreno);
    setVal("totalPulmonFrenoNuevo", cant.pulmonFrenoNuevo * prec.pulmonFrenoNuevo);
    setVal("totalPulmonFrenoReparado", cant.pulmonFrenoReparado * prec.pulmonFrenoReparado);
    setVal("totalLlanta", cant.llantas * prec.llanta);
    setVal("totalAmortiguador", cant.amortiguador * prec.amortiguador);
    setVal("totalBogie", cant.bogie * prec.bogie);

    // Horas hombre
    const hPropio = (parseFloat(document.getElementById("horasPropio").value) || 0) * (parseFloat(document.getElementById("valorHoraPropio").value) || 0);
    const hCoriaM = (parseFloat(document.getElementById("horasCoriaMecanico").value) || 0) * (parseFloat(document.getElementById("valorHoraCoriaMecanico").value) || 0);
    const hCoriaS = (parseFloat(document.getElementById("horasCoriaSoldador").value) || 0) * (parseFloat(document.getElementById("valorHoraCoriaSoldador").value) || 0);
    const hCarrizo = (parseFloat(document.getElementById("horasCarrizo").value) || 0) * (parseFloat(document.getElementById("valorHoraCarrizo").value) || 0);
    const hPatino = (parseFloat(document.getElementById("horasPatino").value) || 0) * (parseFloat(document.getElementById("valorHoraPatino").value) || 0);
    const totalMO = hPropio + hCoriaM + hCoriaS + hCarrizo + hPatino;

    const totalRep = (cant.elasticosO * prec.elastO) + (cant.elasticosF * prec.elastF) + (cant.mazasN * prec.mazaN) + (cant.mazasR * prec.mazaR) + (cant.bulonTuerca * prec.bulon) + (cant.bulonTuerca * prec.tuerca) + (cant.neumaticoNuevo * prec.neumaticoNuevo) + (cant.patinFrenoNuevo * prec.patinFrenoNuevo) + (cant.patinFrenoReparado * prec.patinFrenoReparado) + (cant.levaFreno * prec.levaFreno) + (cant.pulmonFrenoNuevo * prec.pulmonFrenoNuevo) + (cant.pulmonFrenoReparado * prec.pulmonFrenoReparado) + (cant.llantas * prec.llanta) + (cant.amortiguador * prec.amortiguador) + (cant.bogie * prec.bogie);

    setVal("totalPropio", hPropio);
    setVal("totalCoriaMecanico", hCoriaM);
    setVal("totalCoriaSoldador", hCoriaS);
    setVal("totalCarrizo", hCarrizo);
    setVal("totalPatino", hPatino);
    setVal("totalManoObra", totalMO);
    setVal("totalGeneral", totalRep + totalMO);

    // Filter indicator
    const filterIndicator = document.getElementById("filterIndicator");
    if (categoriasSeleccionadas.size > 0 && mesFiltrado !== null) {
        filterIndicator.textContent = "📌 " + categoriasSeleccionadas.size + " seleccionadas - " + CONFIG.meses[mesFiltrado];
    } else if (categoriasSeleccionadas.size > 0) {
        filterIndicator.textContent = "📌 " + categoriasSeleccionadas.size + " seleccionadas (Año)";
    } else if (mesFiltrado !== null) {
        filterIndicator.textContent = "📌 Mes: " + CONFIG.meses[mesFiltrado];
    } else {
        filterIndicator.textContent = "📌 Año completo";
    }
}

function formatMoney(val) {
    return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 }).format(val);
}

// ============================================================
// ===== TARJETAS =====
// ============================================================
function toggleCard(categoria, event) {
    event.preventDefault();
    event.stopPropagation();

    const card = event.currentTarget;
    const isCtrl = event.ctrlKey || event.metaKey;
    const yaSeleccionada = categoriasSeleccionadas.has(categoria);

    if (isCtrl) {
        if (yaSeleccionada) {
            categoriasSeleccionadas.delete(categoria);
            card.classList.remove('selected');
        } else {
            categoriasSeleccionadas.add(categoria);
            card.classList.add('selected');
        }
    } else {
        if (yaSeleccionada && categoriasSeleccionadas.size === 1) {
            categoriasSeleccionadas.clear();
            card.classList.remove('selected');
        } else if (yaSeleccionada) {
            categoriasSeleccionadas.delete(categoria);
            card.classList.remove('selected');
        } else {
            categoriasSeleccionadas.add(categoria);
            card.classList.add('selected');
        }
    }

    actualizarInfoSeleccion();
    actualizarGraficos();
    calcularEconomico();
}

function actualizarInfoSeleccion() {
    const info = document.getElementById('selectionInfo');
    if (categoriasSeleccionadas.size === 0) {
        info.textContent = '💡 Click: Seleccionar | Ctrl+Click: Múltiple | Click en seleccionada: Quitar';
    } else if (categoriasSeleccionadas.size === 1) {
        info.textContent = "📌 Seleccionado: " + cardLabel([...categoriasSeleccionadas][0]) + " - " + (mesFiltrado !== null ? CONFIG.meses[mesFiltrado] : 'Año completo');
    } else {
        const nombres = [...categoriasSeleccionadas].map(function(c) { return cardLabel(c); }).join(', ');
        info.textContent = "📌 " + categoriasSeleccionadas.size + " seleccionadas - " + (mesFiltrado !== null ? CONFIG.meses[mesFiltrado] : 'Año completo');
    }
}

// ============================================================
// ===== GRÁFICOS =====
// ============================================================
function actualizarGraficos() {
    try {
        const d = obtenerDatosActual();
        if (typeof Chart === 'undefined') return;

        const isDark = document.body.classList.contains('dark-mode');
        const textColor = isDark ? '#b0d4e8' : '#2c3e50';
        const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.06)';

        const canvasLine = document.getElementById('chartLine');
        const canvasBar = document.getElementById('chartBar');
        const canvasDoughnut = document.getElementById('chartDoughnut');

        if (!canvasLine || !canvasBar || !canvasDoughnut) return;

        if (charts.line) { charts.line.destroy(); charts.line = null; }
        if (charts.bar) { charts.bar.destroy(); charts.bar = null; }
        if (charts.doughnut) { charts.doughnut.destroy(); charts.doughnut = null; }

        // Líneas
        let lineData = [];
        if (categoriasSeleccionadas.size > 0) {
            const cats = [...categoriasSeleccionadas];
            cats.forEach(function(cat, idx) {
                const datos = Array(12).fill(0);
                CONFIG.equipos.forEach(function(eq) {
                    for (let i = 0; i < 12; i++) {
                        datos[i] += d[cat][eq][i] || 0;
                    }
                });
                const palette = ['rgba(54,162,235,0.9)', 'rgba(75,192,192,0.9)', 'rgba(255,99,132,0.9)', 'rgba(153,102,255,0.9)', 'rgba(255,159,64,0.9)'];
                lineData.push({
                    label: cardLabel(cat),
                    data: datos,
                    borderColor: palette[idx % palette.length],
                    backgroundColor: palette[idx % palette.length].replace('0.9', '0.2'),
                    tension: 0.4,
                    fill: true,
                    pointRadius: 5,
                    borderWidth: 3
                });
            });
        } else {
            const totales = Array(12).fill(0);
            CATEGORIAS.forEach(function(cat) {
                CONFIG.equipos.forEach(function(eq) {
                    for (let i = 0; i < 12; i++) {
                        if (d[cat] && d[cat][eq]) totales[i] += d[cat][eq][i] || 0;
                    }
                });
            });
            lineData = [{
                label: 'Total General',
                data: totales,
                borderColor: 'rgba(54,162,235,0.9)',
                backgroundColor: 'rgba(54,162,235,0.2)',
                tension: 0.4,
                fill: true,
                pointRadius: 5,
                borderWidth: 3
            }];
        }

        charts.line = new Chart(canvasLine, {
            type: 'line',
            data: { labels: CONFIG.meses, datasets: lineData },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top', labels: { color: textColor, font: { size: 12, weight: 'bold' } } },
                    title: { display: true, text: '📈 Evolución Mensual', color: textColor, font: { size: 14, weight: 'bold' } },
                    datalabels: {
                        display: true,
                        color: textColor,
                        font: { size: 9, weight: 'bold' },
                        formatter: function(v) { return v > 0 ? v : ''; },
                        anchor: 'end',
                        align: 'top',
                        offset: 4
                    }
                },
                scales: {
                    y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor, font: { size: 11, weight: 'bold' } } },
                    x: { grid: { display: false }, ticks: { color: textColor, font: { size: 11, weight: 'bold' } } }
                }
            },
            plugins: [ChartDataLabels]
        });

        // Barras
        let barData = [];
        if (categoriasSeleccionadas.size > 0 && mesFiltrado !== null) {
            barData = CONFIG.equipos.map(function(eq) {
                let total = 0;
                categoriasSeleccionadas.forEach(function(cat) { total += d[cat][eq][mesFiltrado] || 0; });
                return total;
            });
        } else if (categoriasSeleccionadas.size > 0) {
            barData = CONFIG.equipos.map(function(eq) {
                let total = 0;
                categoriasSeleccionadas.forEach(function(cat) { total += d[cat][eq].reduce(function(a, b) { return a + b; }, 0); });
                return total;
            });
        } else if (mesFiltrado !== null) {
            barData = CONFIG.equipos.map(function(eq) {
                let total = 0;
                CATEGORIAS.forEach(function(cat) { if (d[cat] && d[cat][eq]) total += d[cat][eq][mesFiltrado] || 0; });
                return total;
            });
        } else {
            barData = CONFIG.equipos.map(function(eq) {
                let total = 0;
                CATEGORIAS.forEach(function(cat) { if (d[cat] && d[cat][eq]) total += d[cat][eq].reduce(function(a, b) { return a + b; }, 0); });
                return total;
            });
        }

        const palette2 = ['rgba(54,162,235,0.8)', 'rgba(75,192,192,0.8)', 'rgba(255,99,132,0.8)', 'rgba(153,102,255,0.8)', 'rgba(255,159,64,0.8)'];
        const barColors = CONFIG.equipos.map(function(_, i) { return palette2[i % palette2.length]; });

        charts.bar = new Chart(canvasBar, {
            type: 'bar',
            data: {
                labels: CONFIG.equipos,
                datasets: [{
                    label: categoriasSeleccionadas.size > 0 ? 'Seleccionados' : 'Total',
                    data: barData,
                    backgroundColor: barColors,
                    borderWidth: 2,
                    borderRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { labels: { color: textColor, font: { size: 12, weight: 'bold' } } },
                    title: { display: true, text: '📊 Consumo por Equipo', color: textColor, font: { size: 14, weight: 'bold' } },
                    datalabels: {
                        display: true,
                        color: textColor,
                        font: { size: 9, weight: 'bold' },
                        formatter: function(v) { return v > 0 ? v : ''; },
                        anchor: 'end',
                        align: 'top',
                        offset: 4
                    }
                },
                scales: {
                    y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor, font: { size: 11, weight: 'bold' } } },
                    x: { grid: { display: false }, ticks: { color: textColor, font: { size: 10, weight: 'bold' } } }
                }
            },
            plugins: [ChartDataLabels]
        });

        // Doughnut
        let doughnutLabels = [];
        let doughnutData = [];
        if (categoriasSeleccionadas.size > 0) {
            const cats = [...categoriasSeleccionadas];
            cats.forEach(function(cat) {
                doughnutLabels.push(cardLabel(cat));
                doughnutData.push(Object.values(d[cat]).flat().reduce(function(a, b) { return a + b; }, 0));
            });
        } else {
            CATEGORIAS.forEach(function(cat) {
                doughnutLabels.push(cardLabel(cat));
                doughnutData.push(Object.values(d[cat]).flat().reduce(function(a, b) { return a + b; }, 0));
            });
        }

        charts.doughnut = new Chart(canvasDoughnut, {
            type: 'doughnut',
            data: {
                labels: doughnutLabels,
                datasets: [{
                    data: doughnutData,
                    backgroundColor: ['rgba(54,162,235,0.9)', 'rgba(75,192,192,0.9)', 'rgba(255,99,132,0.9)', 'rgba(153,102,255,0.9)', 'rgba(255,159,64,0.9)'],
                    borderWidth: 3,
                    borderColor: isDark ? '#0f1a2e' : '#fff'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right', labels: { boxWidth: 12, color: textColor, font: { size: 11, weight: 'bold' } } },
                    title: { display: true, text: '🎯 Distribución', color: textColor, font: { size: 14, weight: 'bold' } },
                    datalabels: {
                        display: true,
                        color: '#fff',
                        font: { size: 10, weight: 'bold' },
                        textStrokeColor: 'rgba(0,0,0,0.5)',
                        textStrokeWidth: 2,
                        formatter: function(v, ctx) {
                            const total = ctx.dataset.data.reduce(function(a, b) { return a + b; }, 0);
                            return total > 0 && v > 0 ? Math.round((v/total)*100) + '%' : '';
                        }
                    }
                },
                cutout: '65%'
            },
            plugins: [ChartDataLabels]
        });

    } catch(e) {
        console.error('Error en gráficos:', e);
    }
}

// ============================================================
// ===== MESES =====
// ============================================================
function cambiarMes(idx) {
    mesFiltrado = idx;
    document.querySelectorAll('.mes-btn').forEach(function(b, i) {
        b.classList.toggle('active', i === idx);
    });
    document.querySelector('.btn-ver-todo').classList.remove('active');
    actualizarTarjetas();
    actualizarGraficos();
    calcularEconomico();
    actualizarInfoSeleccion();
    mostrarToast("📅 " + CONFIG.meses[idx]);
}

function limpiarFiltroMes() {
    mesFiltrado = null;
    document.querySelectorAll('.mes-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelector('.btn-ver-todo').classList.add('active');
    actualizarTarjetas();
    actualizarGraficos();
    calcularEconomico();
    actualizarInfoSeleccion();
    mostrarToast('📅 Año completo');
}

function toggleAccordion(id) {
    const content = document.getElementById(id);
    if (content) content.classList.toggle('open');
}

function mostrarToast(msg, error) {
    error = error || false;
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = 'toast show' + (error ? ' error' : '');
    setTimeout(function() { t.className = 'toast'; }, 3000);
}

// ============================================================
// ===== SEGURIDAD =====
// ============================================================
function abrirModal() {
    document.getElementById('securityModal').classList.add('show');
    document.getElementById('passwordInput').value = '';
}

function cerrarModal() {
    document.getElementById('securityModal').classList.remove('show');
}

function verificarPassword() {
    if (document.getElementById('passwordInput').value === CONFIG.passwordAdmin) {
        cerrarModal();
        modoEdicionActivo = true;
        document.body.classList.remove('read-only-mode');
        document.body.classList.add('editing-mode');
        document.getElementById('lock-indicator').innerHTML = '🔓 Modo edición';
        document.getElementById('lock-indicator').style.color = '#27ae60';
        actualizarTodo();
    }
}

function guardarYBloquear() {
    guardarTodosLosDatos();
    modoEdicionActivo = false;
    document.body.classList.remove('editing-mode');
    document.body.classList.add('read-only-mode');
    document.getElementById('lock-indicator').innerHTML = '🔒 Solo lectura';
    document.getElementById('lock-indicator').style.color = '#e74c3c';
}

// ============================================================
// ===== GUARDADO =====
// ============================================================
function guardarEnLocalStorage() {
    localStorage.setItem(CONFIG.storageKey, JSON.stringify({ añoActual: añoActual, datosPorAnio: datosPorAnio }));
}

async function guardarEnFirebase() {
    try {
        await db.collection("repuestos_minerar").doc("datos_" + añoActual).set({
            añoActual: añoActual,
            datosPorAnio: datosPorAnio
        }, { merge: true });
        return true;
    } catch(e) {
        return false;
    }
}

async function guardarTodosLosDatos(event) {
    const ok = await guardarEnFirebase();
    if (!ok) guardarEnLocalStorage();
    if (event) mostrarToast(ok ? "☁️ Guardado en nube" : "💾 Guardado local");
}

function exportarCSV() {
    mostrarToast("📊 Exportando...");
}

function importarCSV(event) {
    mostrarToast("📥 Importando...");
}

async function resetearDatosCompletos() {
    if (!confirm("⚠️ ¿Resetear TODO?")) return;
    const pass = prompt("Contraseña:");
    if (pass === "NOTOCAR") {
        await db.collection("repuestos_minerar").doc("datos_" + añoActual).delete();
        localStorage.removeItem(CONFIG.storageKey);
        location.reload();
    }
}

document.addEventListener('DOMContentLoaded', init);
</script>
